server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Response headers a <meta> CSP tag cannot express — frame-ancestors is
    # ignored by browsers when set via <meta>, so clickjacking defense for
    # the deployed SPA has to come from here instead (see the note left in
    # vite.config.js's strictCspPlugin when the client-side CSP was built).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback — React Router handles routing client-side, so every
    # path that isn't a real static file must still serve index.html
    # (a hard refresh on e.g. /bookings would 404 without this).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets (Vite fingerprints filenames), never
    # cache index.html itself — it's what points at the current hashes.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
