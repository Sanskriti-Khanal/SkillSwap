<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SkillSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>

<body>
  <div class="auth-container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to your SkillSwap account.</p>
    
    <div id="alertBox" class="alert hidden"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••••••">
      </div>

      <div class="form-group">
        <div class="h-captcha" data-sitekey="10000000-ffff-ffff-ffff-000000000001"></div>
      </div>

      <button type="submit" class="btn" id="loginBtn">Log In</button>

      
      <div class="text-center mt-4">
        <a href="register.html" class="link">Don't have an account? Sign up</a>
      </div>
    </form>

    <form id="mfaForm" class="hidden">
      <div class="form-group">
        <label for="mfaToken">Authenticator Code</label>
        <input type="text" id="mfaToken" name="mfaToken" required placeholder="6-digit code" autocomplete="off">
      </div>
      <button type="submit" class="btn" id="verifyMfaBtn">Verify</button>
    </form>
  </div>

  <script src="./js/auth.js"></script>
</body>
</html>
