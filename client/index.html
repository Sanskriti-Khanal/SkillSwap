<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSwap | Peer Skill-Exchange Marketplace</title>
  <!-- Basic styling for the shell -->
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9fafb;
      color: #111827;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      background-color: #ffffff;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
    }
    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #4f46e5;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
    }
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-outline {
      color: #4f46e5;
      border: 1px solid #4f46e5;
      background: transparent;
    }
    .btn-outline:hover {
      background-color: #f3f4f6;
    }
    .btn-primary {
      color: #ffffff;
      background-color: #4f46e5;
      border: 1px solid #4f46e5;
    }
    .btn-primary:hover {
      background-color: #4338ca;
    }
    .hero {
      max-width: 800px;
      margin: 5rem auto;
      text-align: center;
      padding: 0 2rem;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .hero p {
      font-size: 1.25rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">SkillSwap</a>
    <div class="nav-links">
      <a href="#" class="btn btn-outline">Login</a>
      <a href="#" class="btn btn-primary">Register</a>
    </div>
  </nav>

  <main class="hero">
    <h1>Trade your skills. Learn something new.</h1>
    <p>Join a community where you can exchange your expertise for the skills you've always wanted to learn, without spending a dime.</p>
    <a href="#" class="btn btn-primary" style="padding: 0.75rem 1.5rem; font-size: 1.125rem;">Get Started</a>
  </main>
</body>
</html>
