<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | SkillSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>

<body>
  <div class="auth-container">
    <h1>Join SkillSwap</h1>
    <p class="subtitle">Create an account to start sharing skills.</p>
    
    <div id="alertBox" class="alert hidden"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Minimum 12 characters">
        <div class="strength-meter">
          <div id="strengthBar" class="strength-bar"></div>
        </div>
        <div id="strengthText" class="strength-text"></div>
      </div>

      <div class="form-group">
        <div class="h-captcha" data-sitekey="10000000-ffff-ffff-ffff-000000000001"></div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Create Account</button>

      
      <div class="text-center mt-4">
        <a href="login.html" class="link">Already have an account? Log in</a>
      </div>
    </form>
  </div>

  <script src="./js/auth.js"></script>
</body>
</html>
